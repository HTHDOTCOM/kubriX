kyverno:
  backgroundController:
    resources:
      limits:
        memory: 1Gi
  reportsController:
    resources:
      limits:
        memory: 1Gi

  # workaround for argocd outofsync because of empty labels
  kyverno-api:
    labels:
      app.kubernetes.io/managed-by: helm
    annotations:
      foo: bar

# Compliance policies - Audit mode by default, set to Enforce to block violations
kyvernoPolicies:
  disallowPrivilegeEscalation:
    enabled: true
    validationFailureAction: Audit
  requireNonRoot:
    enabled: true
    validationFailureAction: Audit
  disallowLatestTag:
    enabled: true
    validationFailureAction: Audit
