{{ if .Values.kyvernoPolicies.requireNonRoot.enabled }}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-run-as-non-root
  annotations:
    policies.kyverno.io/title: Require runAsNonRoot
    policies.kyverno.io/category: Pod Security Standards (Restricted), kubrix
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: 1.6.0
    policies.kyverno.io/description: >-
      Containers must not run as root. This policy ensures that either the
      pod-level or container-level securityContext sets runAsNonRoot to true
      or runAsUser to a non-zero value.
spec:
  validationFailureAction: {{ .Values.kyvernoPolicies.requireNonRoot.validationFailureAction | default "Audit" }}
  background: true
  rules:
  - name: require-run-as-non-root
    match:
      any:
      - resources:
          kinds:
          - Pod
    exclude:
      any:
      - resources:
          namespaces:
          - kube-system
          - kyverno
    validate:
      message: >-
        Running as root is not allowed. Set securityContext.runAsNonRoot=true
        or securityContext.runAsUser to a value greater than 0.
      anyPattern:
      - spec:
          securityContext:
            runAsNonRoot: "true"
      - spec:
          securityContext:
            runAsUser: ">0"
      - spec:
          containers:
          - securityContext:
              runAsNonRoot: "true"
{{- end }}
